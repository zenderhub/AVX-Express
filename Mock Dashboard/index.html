/* ZenderBox Design System — Colors + Type tokens
 * Derived from Figma variables + METADATA frequency analysis.
 * Two brand hues: cyan (#029ECB) + lime (#CCD32A) on a warm-neutral surface system.
 */

/* ---------- FONT FACES ---------- */
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 300;
  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-Light.ttf") format("truetype");
}

  font-family: "Plus Jakarta Sans";

  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-Regular.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 400;
  font-style: italic;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-Italic.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 500;
  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-Medium.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 600;
  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-SemiBold.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 700;
  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-Bold.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 700;
  font-style: italic;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-BoldItalic.ttf") format("truetype");
}
@font-face {
  font-family: "Plus Jakarta Sans";
  font-weight: 800;
  font-style: normal;
  font-display: swap;
  src: url("fonts/PlusJakartaSans-ExtraBold.ttf") format("truetype");
}

/* Exo is used only for giant foundation/poster headers in the Figma
 * (100px "FOUNDATIONS"/"CARDS"). Loaded from Google Fonts since no .ttf
 * was shipped. Flagged in README. */
@import url("https://fonts.googleapis.com/css2?family=Exo:wght@700&display=swap");

:root {
  /* ---------- BRAND COLORS ---------- */
  --zb-cyan: #029ECB;           /* primary brand — actions, links, buttons */
  --zb-cyan-dark: #007B9F;      /* pressed / hover, secondary text accent */
  --zb-navy: #004B72;           /* data-point emphasis (name, phone, dir.) */
  --zb-lime: #CCD32A;           /* secondary brand — lime/chartreuse */
  /* ZenderBox Gradient — single diagonal brand gradient.
     Stops: lime 0% → blue 85%. Rendered so azul sits abajo-izquierda and lima arriba-derecha. */
  --zb-gradient: linear-gradient(45deg, #029ECB 0%, #CCD32A 85%);

  /* ---------- NEUTRAL SCALE (warm ink on paper) ---------- */
  --zb-ink-900: #1F1F1F;        /* rarely used; body weight */
  --zb-ink-800: #272727;        /* shadow color base */
  --zb-ink-700: #333333;        /* default body / headings */
  --zb-ink-600: #404040;        /* strong body */
  --zb-ink-500: #666666;        /* secondary text, borders */
  --zb-ink-400: #676966;        /* muted label */
  --zb-ink-300: #8A8A8A;        /* disabled text */
  --zb-ink-200: #B8B8B8;        /* placeholder, disabled border */
  --zb-ink-100: #DBDBDB;        /* dividers */
  --zb-ink-50:  #F6F6F6;        /* app background, disabled surface */
  --zb-paper:   #FFFFFF;

  /* ---------- SEMANTIC ---------- */
  --zb-success:      #008C31;    /* toast "successful" text/icon */
  --zb-success-bg:   #F1F6F5;    /* toast success fill */
  --zb-error:        #F32735;    /* toast error text/icon */
  --zb-error-bg:     #F4E8E9;    /* toast error fill */

  /* ---------- FOUNDATIONAL TOKENS ---------- */
  --zb-font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --zb-font-display: "Exo", "Plus Jakarta Sans", sans-serif;

  --zb-radius-xs: 4px;
  --zb-radius-sm: 8px;           /* inputs, small buttons */
  --zb-radius-md: 10px;          /* cards, product cards, info panels */
  --zb-radius-lg: 16px;
  --zb-radius-pill: 99px;        /* search bars, tags, progress, avatar */

  /* Shadow: soft, low-opacity from toggles + cards */
  --zb-shadow-sm: 0 2px 4px 0 rgba(39, 39, 39, 0.10);
  --zb-shadow-md: 0 4px 12px 0 rgba(39, 39, 39, 0.08);
  --zb-shadow-lg: 0 12px 32px 0 rgba(39, 39, 39, 0.10);

  /* Border used on inputs + outlined cards */
  --zb-border: 1px solid var(--zb-ink-200);
  --zb-border-strong: 1px solid var(--zb-ink-500);
  --zb-border-brand: 1px solid var(--zb-cyan);

  /* Spacing: 4-based, mobile screens use 16/20/32 step */
  --zb-space-1: 4px;
  --zb-space-2: 8px;
  --zb-space-3: 12px;
  --zb-space-4: 16px;
  --zb-space-5: 20px;
  --zb-space-6: 24px;
  --zb-space-8: 32px;
  --zb-space-10: 40px;
  --zb-space-12: 48px;

  /* ---------- SEMANTIC TEXT VARS ---------- */
  --zb-fg:        var(--zb-ink-700);
  --zb-fg-muted:  var(--zb-ink-500);
  --zb-fg-subtle: var(--zb-ink-200);
  --zb-fg-accent: var(--zb-navy);
  --zb-fg-link:   var(--zb-cyan-dark);
  --zb-fg-invert: var(--zb-paper);
  --zb-bg:        var(--zb-paper);
  --zb-bg-app:    var(--zb-ink-50);
  --zb-bg-card:   var(--zb-paper);
  --zb-bg-disabled: var(--zb-ink-50);
}

/* ---------- SEMANTIC TYPE STYLES ----------
 * Named after Figma's text styles:
 *   Section Title (19/24 700), Avatar (24/22 700),
 *   Button (14/18 700), ID (37/100% 700), Label (12/15 700),
 *   Body (16/20 700), Caption L (14/18 500), Tag (10/13 500),
 *   Title Small (13/16 700), NavBar (10/13 500 ink-500),
 *   Caption (13/16 500), Placeholder (13/16 500 ink-200),
 *   NavBar On (10/13 700 cyan)
 */
.zb-display {          /* Exo poster — section dividers only */
  font-family: var(--zb-font-display);
  font-weight: 700;
  font-size: 100px;
  line-height: 100%;
  letter-spacing: -0.01em;
  color: var(--zb-fg);
}
.zb-id {               /* big number readouts: points, counts */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 37px;
  line-height: 100%;
  color: var(--zb-fg);
}
.zb-h1 {               /* dashboard page titles */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 24px;
  line-height: 32px;
  color: var(--zb-fg);
}
.zb-avatar-title {     /* "Hola, Juan" row: 24/22 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 24px;
  line-height: 22px;
  color: var(--zb-fg);
}
.zb-section-title {    /* "Mis estadísticas" etc: 19/24 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 19px;
  line-height: 24px;
  color: var(--zb-fg);
}
.zb-body {             /* Key/value bold labels in info cards: 16/20 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 16px;
  line-height: 20px;
  color: var(--zb-fg);
}
.zb-body-regular {
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 16px;
  line-height: 20px;
  color: var(--zb-fg);
}
.zb-title-small {      /* card titles 13/16 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 13px;
  line-height: 16px;
  color: var(--zb-fg);
}
.zb-button {           /* button/link label: 14/18 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 14px;
  line-height: 18px;
}
.zb-caption-l {        /* strong secondary: 14/18 500 */
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 14px;
  line-height: 18px;
  color: var(--zb-fg-muted);
}
.zb-caption {          /* helper / meta: 13/16 500 */
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 13px;
  line-height: 16px;
  color: var(--zb-fg-muted);
}
.zb-label {            /* input labels: 12/15 700 */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 12px;
  line-height: 15px;
  color: var(--zb-fg);
}
.zb-tag {              /* chips / level: 10/13 500 */
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 10px;
  line-height: 13px;
  color: var(--zb-fg-muted);
}
.zb-navbar {           /* tab bar inactive: 10/13 500 */
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 10px;
  line-height: 13px;
  color: var(--zb-ink-500);
}
.zb-navbar-on {        /* tab bar active: 10/13 700 cyan */
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 10px;
  line-height: 13px;
  color: var(--zb-cyan);
}
.zb-placeholder {
  font-family: var(--zb-font-sans);
  font-weight: 500;
  font-size: 13px;
  line-height: 16px;
  color: var(--zb-ink-200);
}

/* ---------- PRIMITIVES ---------- */
.zb-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 20px;
  border-radius: var(--zb-radius-sm);
  border: 0;
  font-family: var(--zb-font-sans);
  font-weight: 700;
  font-size: 14px;
  line-height: 18px;
  cursor: pointer;
  transition: filter .15s ease, transform .1s ease, background .15s ease;
}
.zb-btn-primary {
  background: var(--zb-gradient);
  color: var(--zb-paper);
}
.zb-btn-primary:hover  { filter: brightness(1.05); }
.zb-btn-primary:active { transform: scale(0.98); filter: brightness(0.95); }

.zb-btn-secondary {
  background: var(--zb-cyan);
  color: var(--zb-paper);
}
.zb-btn-stroke {
  background: var(--zb-ink-50);
  color: var(--zb-cyan-dark);
  border: 1px solid var(--zb-cyan-dark);
}
.zb-btn-sm {
  padding: 8px 14px;
  font-size: 13px;
  line-height: 16px;
  border-radius: var(--zb-radius-sm);
}

button{font-family:inherit}
input,textarea,select{font-family:inherit}

@keyframes zbFadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes zbDrawerIn { from { transform: translateX(100%) } to { transform: translateX(0) } }
@keyframes zbModalIn { from { opacity: 0; transform: scale(0.97) } to { opacity: 1; transform: scale(1) } }
@keyframes zbToastIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
@keyframes zbPageIn { from { opacity: 0; transform: translateY(4px) } to { opacity: 1 } }
.zb-page { animation: zbPageIn .18s ease backwards; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #DBDBDB; border-radius: 8px; border: 2px solid #F6F6F6; }
::-webkit-scrollbar-thumb:hover { background: #B8B8B8; }

function _ico(name, size, sw) {
  size = size || 18;
  sw   = sw   || 1.8;
  // En el UMD de Lucide cada icono es directamente [[tag, attrs], ...]
  const nodes = window.lucide && window.lucide[name];
  if (!nodes) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      fill="none" stroke="currentColor"
      strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
      {nodes.map(function(node, i) {
        return React.createElement(node[0], Object.assign({ key: i }, node[1]));
      })}
    </svg>
  );
}

// ============ Buttons ============
function Btn({ variant = "primary", size = "md", children, onClick, style = {}, disabled, type="button", iconLeft, iconRight }) {
  const base = {
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
    border: 0, cursor: disabled ? "not-allowed" : "pointer",
    fontFamily: "Ubuntu", fontWeight: 700,
    borderRadius: 8, transition: "filter .15s ease, transform .1s ease",
    opacity: disabled ? 0.55 : 1,
  };
  const sizes = {
    sm: { padding: "8px 14px", fontSize: 13, lineHeight: "16px" },
    md: { padding: "12px 20px", fontSize: 14, lineHeight: "18px" },
    lg: { padding: "16px 24px", fontSize: 15, lineHeight: "18px" },
  };
  const variants = {
    primary:   { background: GRADIENT, color: "#F6F6F6" },
    secondary: { background: "#C8352B", color: "#F6F6F6" },
    stroke:    { background: "#F6F6F6", color: "#C8352B", border: "1px solid #C8352B" },
    ghost:     { background: "transparent", color: "#333" },
    danger:    { background: "#F6F6F6", color: "#E02424", border: "1px solid #E02424" },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} style={{ ...base, ...sizes[size], ...variants[variant], ...style }}
      onMouseEnter={e => { if (!disabled) e.currentTarget.style.filter = "brightness(1.05)"; }}
      onMouseLeave={e => { e.currentTarget.style.filter = "brightness(1)"; }}
      onMouseDown={e => { if (!disabled) e.currentTarget.style.transform = "scale(0.98)"; }}
      onMouseUp={e => { e.currentTarget.style.transform = "scale(1)"; }}>
      {iconLeft}
      {children}
      {iconRight}
    </button>
  );
}

const inputBase = {
  width: "100%", height: 42, padding: "10px 14px",
  background: "#F6F6F6", border: "1px solid #B8B8B8", borderRadius: 8,
  fontFamily: "Ubuntu", fontWeight: 500, fontSize: 14, color: "#333",
  outline: "none", transition: "border-color .15s ease", boxSizing: "border-box",
};

function Input(props) {
  const { error, ...rest } = props;
  return <input {...rest} style={{
    ...inputBase, ...(error ? { borderColor: "#F32735" } : {}), ...(props.style||{}),
  }} onFocus={e => e.currentTarget.style.borderColor = error ? "#F32735" : "#C8352B"}
     onBlur={e => e.currentTarget.style.borderColor = error ? "#F32735" : "#B8B8B8"} />;
}

function Textarea(props) {
  return <textarea {...props} style={{
    ...inputBase, height: "auto", minHeight: 96, paddingTop: 12,
    resize: "vertical", ...(props.style||{}),
  }} onFocus={e => e.currentTarget.style.borderColor = "#C8352B"}
     onBlur={e => e.currentTarget.style.borderColor = "#B8B8B8"} />;
}

function Select({ value, onChange, options, placeholder, style = {} }) {
  return (
    <div style={{ position: "relative", ...style }}>
      <select value={value} onChange={e => onChange(e.target.value)} style={{
        ...inputBase, appearance: "none", paddingRight: 38, cursor: "pointer",
        color: value ? "#333" : "#B8B8B8",
      }}>
        {placeholder && <option value="">{placeholder}</option>}
        {options.map(o => typeof o === "string"
          ? <option key={o} value={o}>{o}</option>
          : <option key={o.value} value={o.value}>{o.label}</option>
        )}
      </select>
      <div style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#666" }}>
        <IcoChevronDown />
      </div>
    </div>
  );
}

// ============ Checkbox + Toggle ============
function Checkbox({ checked, onChange, label, style = {} }) {
  return (
    <label style={{ display: "inline-flex", alignItems: "center", gap: 10, cursor: "pointer", fontFamily: "Ubuntu", fontSize: 13, color: "#333", ...style }}>
      <span style={{
        width: 18, height: 18, borderRadius: 4,
        border: checked ? "1px solid #C8352B" : "1px solid #B8B8B8",
        background: checked ? GRADIENT : "#F6F6F6",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        color: "#F6F6F6", transition: "all .15s ease",
      }}>{checked && <IcoCheck size={12} />}</span>
      <input type="checkbox" checked={checked} onChange={e => onChange?.(e.target.checked)} style={{ display: "none" }} />
      {label}
    </label>
  );
}

function Toggle({ on, onChange }) {
  return (
    <button onClick={() => onChange?.(!on)} style={{
      width: 40, height: 22, borderRadius: 10, border: 0, cursor: "pointer",
      background: on ? GRADIENT : "#DBDBDB",
      position: "relative", padding: 0, transition: "background .15s ease",
    }}>
      <span style={{
        position: "absolute", top: 2, left: on ? 20 : 2,
        width: 18, height: 18, borderRadius: 10, background: "#F6F6F6",
        boxShadow: "0 2px 4px rgba(39,39,39,0.2)",
        transition: "left .15s ease",
      }} />
    </button>
  );
}

// Lucide icons para cada estado del timeline
const TIMELINE_ICONS = {
  tienda:     "ShoppingBag",
  bodega:     "Warehouse",
  despachado: "Send",
  camino:     "Truck",
  entregado:  "PackageCheck",
};

// ============ Horizontal timeline ============
function Timeline({ currentId, compact = false, style = {} }) {
  const idx = STATES.findIndex(s => s.id === currentId);
  const activeColor = "#1E4B8A";
  const GRAY = "#DBDBDB";

  const shortLabel = { tienda: "Tienda", bodega: "Bodega", despachado: "Despachado", camino: "En Camino", entregado: "Entregado" };

  if (compact) {
    return (
      <div style={{ display: "flex", alignItems: "center", width: "100%", ...style }}>
        {STATES.map((s, i) => {
          const done = i < idx;
          const active = i === idx;
          return (
            <React.Fragment key={s.id}>
              <div style={{
                width: active ? 10 : 8, height: active ? 10 : 8, borderRadius: 10, flexShrink: 0,
                background: done || active ? activeColor : GRAY,
                boxShadow: active ? `0 0 0 3px ${activeColor}30` : "none",
              }} />
              {i < STATES.length - 1 && (
                <div style={{ flex: 1, height: 2, margin: "0 4px", background: done ? activeColor : GRAY, borderRadius: 2, minWidth: 8 }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
    );
  }

  return (
    <div style={{ display: "flex", alignItems: "flex-start", width: "100%", ...style }}>
      {STATES.map((s, i) => {
        const isDone = i <= idx;
        const isActive = i === idx;
        const color = isDone ? activeColor : GRAY;
        const lucideName = TIMELINE_ICONS[s.id];
        const iconNodes = lucideName && window.lucide && window.lucide[lucideName];
        return (
          <React.Fragment key={s.id}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flexShrink: 0 }}>
              <div style={{
                width: 32, height: 32, borderRadius: 10,
                display: "flex", alignItems: "center", justifyContent: "center",
                background: isDone ? color : GRAY,
              }}>
                {iconNodes && (
                  <svg width={16} height={16} viewBox="0 0 24 24" fill="none"
                    stroke="#FFFFFF" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
                    {iconNodes.map(function(n, i) { return React.createElement(n[0], Object.assign({ key: i }, n[1])); })}
                  </svg>
                )}
              </div>
              <div style={{
                fontFamily: "Ubuntu", fontWeight: isActive ? 700 : 500,
                fontSize: 11, color: isActive ? color : "#8A8A8A",
                textAlign: "center", whiteSpace: "nowrap",
              }}>{shortLabel[s.id] || s.label}</div>
            </div>
            {i < STATES.length - 1 && (
              <div style={{
                flex: 1, height: 2, alignSelf: "flex-start", marginTop: 15,
                background: i < idx ? activeColor : GRAY,
                borderRadius: 2, minWidth: 8,
              }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

// ============ Toast ============
function Toast({ msg, variant = "success", onClose }) {
  if (!msg) return null;
  const variants = {
    success: { bg: "#F1F6F5", fg: "#008C31" },

// ============ Copy button (with flash feedback) ============
function CopyButton({ value, onCopy }) {
  const [copied, setCopied] = React.useState(false);
  const click = (e) => {
    e.stopPropagation();
    try { navigator.clipboard?.writeText(value); } catch (_) {}
    setCopied(true);
    onCopy?.(value);
    setTimeout(() => setCopied(false), 1200);
  };
  return (
    <button onClick={click} title="Copiar" style={{
      background: "transparent", border: 0, cursor: "pointer", padding: 2,
      color: copied ? "#008C31" : "#B8B8B8", transition: "color .15s ease",
      display: "inline-flex", alignItems: "center",
    }}>
      {copied ? <IcoCheck /> : <IcoCopy />}
    </button>
  );
}

        : <IcoPackage size={iconSize} />

  );
}

  const [isTablet, setIsTablet] = React.useState(

    const onResize = () => setIsTablet(window.innerWidth <= 1180);

const TITLES = {
  dashboard: "Dashboard",
  tracking:  "Tracking",
};

function App() {
  const initial = window.location.hash.replace("#", "") || "dashboard";
  const [active, setActive] = React.useState(TITLES[initial] ? initial : "dashboard");
  const [toast, setToast] = React.useState(null);

  const nav = (id) => {
    if (id === "salir") { setToast("Cerrando sesión…"); return; }
    if (!TITLES[id]) return;
    setActive(id);
    window.location.hash = id;
    window.scrollTo({ top: 0 });
  };

  React.useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace("#", "");
      if (TITLES[h]) setActive(h);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  React.useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  const pageProps = { setToast, onNav: nav };
  let Page = null;
  switch (active) {
    case "dashboard": Page = <DashboardPage {...pageProps} />; break;
    case "tracking":  Page = <TrackingPage  {...pageProps} />; break;
    default:          Page = <DashboardPage {...pageProps} />;
  }

  return (
    <>
      <Shell active={active} onNav={nav} title={TITLES[active] || "Dashboard"}>
        <div key={active} className="zb-page" data-screen-label={active}>
          {Page}
        </div>
      </Shell>
      <Toast msg={toast} onClose={() => setToast(null)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
