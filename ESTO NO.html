
<title>AVX Express LLC — Logo vectorizado</title>
<style>
  :root {
    --red:    #C83228;
    --blue:   #2B4C8A;
    --bg:     #f8f8f8;
    --surface:#ffffff;
    --border: #e2e2e2;
    --text:   #1a1a1a;
    --muted:  #666;
    --code-bg:#f2f2f2;
    --radius: 10px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #111;
      --surface:#1c1c1c;
      --border: #2e2e2e;
      --text:   #f0f0f0;
      --muted:  #888;
      --code-bg:#222;
    }
  }
  :root[data-theme="light"] {
    --bg:#f8f8f8; --surface:#ffffff; --border:#e2e2e2;
    --text:#1a1a1a; --muted:#666; --code-bg:#f2f2f2;
  }
  :root[data-theme="dark"] {
    --bg:#111; --surface:#1c1c1c; --border:#2e2e2e;
    --text:#f0f0f0; --muted:#888; --code-bg:#222;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }

  header {
    text-align: center;
  }
  header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .logo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 640px;
  }

  .logo-card svg {
    width: 100%;
    max-width: 520px;
    height: auto;
  }

  .variants {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 640px;
  }

  .variant {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .variant.dark-bg { background: #111; }
  .variant.white-bg { background: #fff; border: 1px solid #e2e2e2; }

  .variant svg {
    width: 100%;
    height: auto;
  }

  .variant-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .variant-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    padding: 11px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .15s;
    letter-spacing: .01em;
  }
  button:hover { opacity: .85; }
  button:active { opacity: .7; transform: scale(.98); }

  .btn-primary {
    background: var(--red);
    color: #fff;
  }
  .btn-secondary {
    background: var(--blue);
    color: #fff;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
  }

  details {
    width: 100%;
    max-width: 640px;
  }
  summary {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    letter-spacing: .04em;
    padding: 4px 0;
  }
  summary:hover { color: var(--text); }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    font-size: 11.5px;
    line-height: 1.55;
    overflow-x: auto;
    margin-top: 12px;
    color: var(--muted);
    white-space: pre;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 8px;
    opacity: 0;
    transition: transform .25s ease, opacity .25s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 480px;
    line-height: 1.6;
  }
</style>

<!-- SVG template (hidden, used for export) -->
<template id="svg-template">
<svg viewBox="0 0 520 188" xmlns="http://www.w3.org/2000/svg" width="520" height="188">
  <!-- Eagle icon -->
  <g fill="#C83228">
    <!-- Main upper wing sweep -->
    <path d="
      M 14,113
      C 8,87 12,52 32,30
      C 52,8 88,2 132,18
      L 106,24
      C 84,20 62,30 48,50
      C 70,22 112,20 148,38
      L 120,54
      C 136,46 150,57 148,72
      L 106,78
      L 148,85
      L 118,110
      L 80,104
      Z
    "/>
    <!-- Tail feathers -->
    <path d="
      M 36,115
      L 22,138 L 46,128 L 40,155
      L 64,132 L 60,160
      L 84,134 L 80,162
      L 100,136 L 96,115
      Z
    "/>
  </g>
  <!-- AVX -->
  <text x="168" y="122"
    font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif"
    font-size="105"
    font-weight="900"
    fill="#C83228">AVX</text>
  <!-- EXPRESS LLC -->
  <text x="170" y="175"
    font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif"
    font-size="44"
    font-weight="900"
    fill="#2B4C8A"
    letter-spacing="2">EXPRESS LLC</text>
</svg>

<!-- White version -->
<template id="svg-white">
<svg viewBox="0 0 520 188" xmlns="http://www.w3.org/2000/svg" width="520" height="188">
  <g fill="#ffffff">
    <path d="M 14,113 C 8,87 12,52 32,30 C 52,8 88,2 132,18 L 106,24 C 84,20 62,30 48,50 C 70,22 112,20 148,38 L 120,54 C 136,46 150,57 148,72 L 106,78 L 148,85 L 118,110 L 80,104 Z"/>
    <path d="M 36,115 L 22,138 L 46,128 L 40,155 L 64,132 L 60,160 L 84,134 L 80,162 L 100,136 L 96,115 Z"/>
  </g>
  <text x="168" y="122" font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="105" font-weight="900" fill="#ffffff">AVX</text>
  <text x="170" y="175" font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">EXPRESS LLC</text>
</svg>
</template>

<header>
  <h1>AVX Express LLC &mdash; Logo vectorizado</h1>
</header>

<div class="logo-card">
  <div id="main-logo"></div>
</div>

<div class="variants">
  <div class="variant-wrap">
    <p class="variant-label">Fondo oscuro</p>
    <div class="variant dark-bg" id="dark-preview"></div>
  </div>
  <div class="variant-wrap">
    <p class="variant-label">Fondo blanco</p>
    <div class="variant white-bg" id="white-preview"></div>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="downloadSVG('color')">Descargar SVG color</button>
  <button class="btn-secondary" onclick="downloadSVG('white')">Descargar SVG blanco</button>
  <button class="btn-outline" onclick="copySVG()">Copiar código SVG</button>
</div>

<p class="note">
  Los textos usan fuentes del sistema (Arial Black / Impact). Para una versión definitiva, convierte los textos en curvas en Illustrator o Figma y aplica tu fuente de marca.
</p>

<details>
  <summary>Ver código SVG</summary>
  <pre id="svg-code-display"></pre>
</details>

<div class="toast" id="toast">Código copiado</div>

<script>
  const colorSVG = document.getElementById('svg-template').innerHTML.trim();
  const whiteSVG = document.getElementById('svg-white').innerHTML.trim();

  // Inject previews
  document.getElementById('main-logo').innerHTML = colorSVG;
  document.getElementById('dark-preview').innerHTML = whiteSVG;
  document.getElementById('white-preview').innerHTML = colorSVG;

  // Format for display
  const pretty = colorSVG
    .replace(/></g, '>\n<')
    .replace(/\s{2,}/g, ' ')
    .trim();
  document.getElementById('svg-code-display').textContent = colorSVG;

  function downloadSVG(variant) {
    const content = variant === 'white' ? whiteSVG : colorSVG;
    const blob = new Blob([content], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = variant === 'white' ? 'avx-express-blanco.svg' : 'avx-express-color.svg';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Descargando SVG...');
  }

  function copySVG() {
    navigator.clipboard.writeText(colorSVG).then(() => showToast('Código copiado'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
